steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/tablebooking-backend:${_ENVIRONMENT}-${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/tablebooking-backend:${_ENVIRONMENT}-latest'
      - '.'
    id: 'build-image'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/tablebooking-backend:${_ENVIRONMENT}-${SHORT_SHA}'
    id: 'push-image-commit'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/tablebooking-backend:${_ENVIRONMENT}-latest'
    id: 'push-image-latest'
    waitFor: ['build-image']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/tablebooking-backend:${_ENVIRONMENT}-${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'NODE_ENV=production,PORT=8080,CORS_ORIGIN=${_CORS_ORIGIN},RATE_LIMIT_WINDOW_MS=900000,RATE_LIMIT_MAX_REQUESTS=200'
      # Sensitive values: use Secret Manager, mapped to the same env names as in .env.local
      - '--set-secrets'
      - 'MONGODB_URI=${_MONGODB_URI_SECRET}:latest,FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID_SECRET}:latest,FIREBASE_CLIENT_EMAIL=${_FIREBASE_CLIENT_EMAIL_SECRET}:latest,FIREBASE_PRIVATE_KEY=${_FIREBASE_PRIVATE_KEY_SECRET}:latest'
    id: 'deploy-cloud-run'
    waitFor: ['push-image-commit']

# Substitution variables - Set these in Cloud Build triggers (not here)
#   _REGION: 'asia-southeast1' (or your region)
#   _AR_REPOSITORY: 'tablebooking-backend' (Artifact Registry repository name)
#   _SERVICE_NAME: 'tablebooking-backend-dev' (or staging/prod)
#   _ENVIRONMENT: 'dev' (or staging, prod)
#   _CORS_ORIGIN: 'https://your-frontend-domain.com' (comma-separated allowed origins if needed)
#
# Secret-name substitutions (one set per environment; values are Secret Manager secret IDs):
#   _MONGODB_URI_SECRET: 'tablebooking-backend-<env>-mongodb-uri'
#   _FIREBASE_PROJECT_ID_SECRET: 'tablebooking-backend-<env>-firebase-project-id'
#   _FIREBASE_CLIENT_EMAIL_SECRET: 'tablebooking-backend-<env>-firebase-client-email'
#   _FIREBASE_PRIVATE_KEY_SECRET: 'tablebooking-backend-<env>-firebase-private-key'

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: 'ALLOW_LOOSE'

timeout: '1800s'

